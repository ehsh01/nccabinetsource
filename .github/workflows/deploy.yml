# Build on push to staging or main
# Hosting platforms (Vercel, Netlify, Replit, etc.) typically auto-deploy when connected to this repo.
# Configure your platform: main = production, staging = staging/preview.

name: Build

on:
  push:
    branches: [main, staging]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build
